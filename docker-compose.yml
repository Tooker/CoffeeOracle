services:
  coffeeoracle:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE: ""
    env_file:
      - .env
    ports:
      - "3000:3000"
    environment:
      PORT: "8080"
      FRONTEND_PORT: "3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:8080/healthz >/dev/null && wget -qO- http://127.0.0.1:3000/ >/dev/null",
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
